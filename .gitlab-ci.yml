stages:
  - build
  - test
  - sonar
  - publish

variables:
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  DOCKER_IMAGE_NAME: "alkxyly/gestor-contratos-ui"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH


cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/
    - node_modules/

build_app:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

test_app:
  stage: test
  image: node:20
  variables:
    CHROME_BIN: /usr/bin/chromium
  before_script:
    - apt-get update && apt-get install -y chromium
  script:
    - npm run test -- --no-watch --no-progress --browsers=ChromeHeadlessCI --code-coverage
  artifacts:
    paths:
      - coverage/
    reports:
      junit: coverage/junit.xml
    expire_in: 1 hour
  dependencies:
    - build_app

sonarqube_check:
  stage: sonar
  image: sonarsource/sonar-scanner-cli
  script:
    - sonar-scanner
      -Dsonar.projectKey=$SONAR_PROJECT_KEY
      -Dsonar.organization=alkxyly-group
      -Dsonar.host.url=$SONAR_HOST_URL
      -Dsonar.login=$SONAR_TOKEN
      -Dsonar.sources=src
      -Dsonar.javascript.lcov.reportPaths=coverage/sakai-ng/lcov.info
      -Dsonar.qualitygate.wait=true
  dependencies:
    - test_app

publish_docker_image:
  stage: publish
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == "develop" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
  before_script:
    - echo "Login no DockerHub..."
    - echo "$DOCKER_SECRET" | docker login -u "$DOCKER_USERNAME" --password-stdin
    - docker info
    - docker --version
  script:
    - echo "Construindo a imagem Docker..."
    - docker build -t $DOCKER_IMAGE_NAME:latest -t $DOCKER_IMAGE_NAME:$CI_COMMIT_SHORT_SHA .
    - docker push $DOCKER_IMAGE_NAME:latest
    - docker push $DOCKER_IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - echo "Imagem Docker enviada com sucesso!"