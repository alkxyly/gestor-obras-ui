<div class="grid">
    <div class="col-12">
        <div class="card">
            <h4>Cadastrar Solicitação de Compra</h4>

            <h5>Dados da Solicitação</h5>
            <div class="p-fluid p-formgrid grid">
                <div class="field col-12 md:col-6">
                    <label htmlFor="descricao">Descrição</label>
                    <input pInputText id="descricao" type="text" [(ngModel)]="solicitacao.descricao"
                        placeholder="Ex: Material para o escritório" />
                </div>
                <div class="field col-12 md:col-6">
                    <label htmlFor="prazoLimite">Prazo Limite</label>
                    <p-calendar id="prazoLimite" [(ngModel)]="solicitacao.prazoLimite" dateFormat="dd/mm/yy"
                        [showIcon]="true"></p-calendar>
                </div>
            </div>

            <p-divider></p-divider>

            <h5>Itens da Solicitação</h5>
            <div class="p-fluid p-formgrid grid align-items-end">
                <div class="field col-12 md:col-4">
                    <label htmlFor="itemDescricao">Descrição do Item</label>
                    <input pInputText id="itemDescricao" type="text" [(ngModel)]="novoItem.descricao"
                        placeholder="Nome do item" />
                </div>
                <div class="field col-12 md:col-3">
                    <label htmlFor="itemCatalogo">Número de Catálogo (Opcional)</label>
                    <input pInputText id="itemCatalogo" type="text" [(ngModel)]="novoItem.numeroCatalogo" />
                </div>
                <div class="field col-12 md:col-2">
                    <label htmlFor="itemQuantidade">Quantidade</label>
                    <p-inputNumber id="itemQuantidade" [(ngModel)]="novoItem.quantidade" [min]="1"
                        [showButtons]="true"></p-inputNumber>
                </div>
                <div class="field col-12 md:col-2 flex flex-column justify-content-end">
                    <label htmlFor="itemFoto">Foto (Opcional)</label>
                    <div class="flex align-items-center">
                        <p-fileUpload #fileUpload mode="basic" chooseLabel="Anexar" name="demo[]" accept="image/*"
                            maxFileSize="1000000" (onSelect)="onBasicUpload($event, novoItem, fileUpload)" [auto]="true"
                            class="mr-2"></p-fileUpload>
                        <p-image *ngIf="novoItem.foto" [src]="novoItem.foto" alt="Preview" width="40"
                            [preview]="true"></p-image>
                        <button *ngIf="novoItem.foto" pButton pRipple icon="pi pi-times"
                            class="p-button-rounded p-button-danger p-button-text p-button-sm ml-2"
                            (click)="removerFotoItem()"></button>
                    </div>
                </div>
                <div class="field col-12 md:col-1">
                    <button pButton pRipple icon="pi pi-plus" class="p-button-success" (click)="adicionarItem()"
                        [disabled]="!novoItem.descricao || novoItem.quantidade < 1"></button>
                </div>
            </div>

            <p-table [value]="solicitacao.itens" responsiveLayout="scroll" styleClass="mt-3">
                <ng-template pTemplate="header">
                    <tr>
                        <th style="width: 3rem">#</th>
                        <th>Descrição</th>
                        <th>Nº Catálogo</th>
                        <th>Quantidade</th>
                        <th>Foto</th>
                        <th style="width: 5rem">Ações</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-item let-i="rowIndex">
                    <tr>
                        <td>{{i + 1}}</td>
                        <td>{{item.descricao}}</td>
                        <td>{{item.numeroCatalogo}}</td>
                        <td>{{item.quantidade}}</td>
                        <td>
                            <p-image *ngIf="item.foto" [src]="item.foto" alt="Preview" width="50"
                                [preview]="true"></p-image>
                            <span *ngIf="!item.foto" class="text-color-secondary">Sem foto</span>
                        </td>
                        <td>
                            <button pButton pRipple icon="pi pi-trash"
                                class="p-button-rounded p-button-danger p-button-text"
                                (click)="removerItem(i)"></button>
                        </td>
                    </tr>
                </ng-template>
                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="6">Nenhum item adicionado à solicitação.</td>
                    </tr>
                </ng-template>
            </p-table>

            <div class="flex justify-content-end mt-4">
                <button pButton pRipple label="Salvar" icon="pi pi-save" class="p-button-primary"
                    (click)="salvar()"></button>
            </div>
        </div>
    </div>
</div>
