<div class="col-12 lg:col-6 xl:col-3">
    <div class="card card-custom mb-0">
      <div class="flex justify-content-between mb-3">
        <div>
          <span class="block text-900 font-bold mb-3">{{ titulo }}</span>
          <div class="text-900 font-medium text-xl">
            <ng-container>
              <span class="text-2xl font-bold">{{ valor | currency: 'BRL': 'symbol': '1.2-2' }}</span>
            </ng-container>
          </div>
        </div>
        <div class="flex align-items-center justify-content-center bg-purple-100 border-round" [ngStyle]="{width: '2.5rem', height: '2.5rem'}">
          <i class="pi" [ngClass]="icone + ' text-purple-500 text-xl'"></i>
        </div>
      </div>
      <div class="custom-tooltip" *ngIf="tooltip">
        {{ tooltip }}
      </div>
    </div>
</div>
