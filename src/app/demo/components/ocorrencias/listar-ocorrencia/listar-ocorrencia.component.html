<div class="grid">
    <div class="col-12">
        <div class="card">
            <h5>Gestão de Ocorrências</h5>
            
            <p-table 
                #dt 
                [value]="ocorrencias" 
               
                responsiveLayout="stack" 
                [breakpoint]="'960px'"
                [rows]="10" 
                [paginator]="true" 
                [rowsPerPageOptions]="[5,10,20]"
                selectionMode="multiple" 
                [rowHover]="true" 
                dataKey="id">
                
                <ng-template pTemplate="caption">
                    <div class="flex flex-column md:flex-row md:justify-content-between md:align-items-center">
                        <span class="block mt-2 md:mt-0 p-input-icon-left">
                            <i class="pi pi-search"></i>
                            <input pInputText type="text" (input)="dt.filterGlobal($event.target.value, 'contains')" placeholder="Buscar ocorrência..." />
                        </span>
                        <button pButton label="Cadastrar" icon="pi pi-plus" class="p-button-success mr-2"></button>
                    </div>
                </ng-template>

                <ng-template pTemplate="header" let-columns>
                    <tr>
                        <th pSortableColumn="descricao">Descrição <p-sortIcon field="descricao"></p-sortIcon></th>
                        <th pSortableColumn="valor">Valor <p-sortIcon field="valor"></p-sortIcon></th>
                        <th pSortableColumn="unidade">Unidade <p-sortIcon field="unidade"></p-sortIcon></th>
                        <th>Ações</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-ocorrencia>
                    <tr>
                        <td>
                            <span class="p-column-title">Descrição</span>
                            {{ocorrencia.descricao}}
                        </td>
                        <td>
                            <span class="p-column-title">Valor</span>
                            {{ ocorrencia.valor | currency:'BRL':'symbol':'1.2-2' }}
                        </td>
                        <td>
                            <span class="p-column-title">Unidade</span>
                            {{ocorrencia.unidade}}
                        </td>
                        <td>
                            <div class="flex gap-2">
                                <button 
                                    pButton 
                                    pRipple 
                                    icon="pi pi-pencil" 
                                    class="p-button-rounded p-button-text p-button-info" 
                                    pTooltip="Editar Contrato" 
                                    tooltipPosition="bottom">
                                </button>
                        
                                <button 
                                    pButton 
                                    pRipple 
                                    icon="pi pi-trash" 
                                    class="p-button-rounded p-button-text p-button-danger" 
                                    pTooltip="Excluir Contrato" 
                                    tooltipPosition="bottom">
                                </button>
                            </div>
                        </td>
                    </tr>
                </ng-template>

                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="5">Nenhum contrato encontrado.</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</div>
